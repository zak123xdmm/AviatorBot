<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE-GUARD ELITE | Dashboard</title>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #fcd535; --danger: #f6465d; --success: #0ecb81; --text-main: #eaecef; --text-dim: #848e9c; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 480px; background: var(--card); border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #2b3139; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        h1 { margin: 0; font-size: 24px; color: var(--primary); letter-spacing: -1px; }
        .ping-box { font-size: 11px; color: var(--success); background: rgba(14, 203, 129, 0.1); padding: 4px 8px; border-radius: 4px; }
        .quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-card { background: #2b3139; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .main-input { width: 100%; background: #2b3139; border: 2px solid transparent; border-radius: 12px; color: white; padding: 20px; font-size: 28px; text-align: center; box-sizing: border-box; margin-bottom: 15px; }
        .main-input:focus { border-color: var(--primary); outline: none; background: #363c44; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
        .btn-send { background: var(--primary); color: black; }
        .btn-undo { background: #474d57; color: white; }
        .history-section { margin-top: 30px; }
        .badge-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .badge { background: #2b3139; padding: 10px; border-radius: 8px; text-align: center; font-weight: 600; border-left: 4px solid #474d57; }
        .badge.lose { border-color: var(--danger); color: var(--danger); }
        .badge.win { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div>
                <h1>SAFE-GUARD ELITE</h1>
                <div style="color:var(--text-dim); font-size:12px;">SESIÓN: <span id="sessID">...</span></div>
            </div>
            <div class="ping-box">📡 CLOUD ACTIVE</div>
        </div>
        <div class="quick-stats">
            <div class="stat-card"><span class="stat-val" id="countReds">0</span><span class="stat-label">Rojos Seguidos</span></div>
            <div class="stat-card"><span class="stat-val" id="totalSess">0</span><span class="stat-label">Total Entradas</span></div>
        </div>
        <input type="number" id="val" class="main-input" placeholder="0.00" step="0.01" autofocus>
        <div class="btn-group">
            <button class="btn btn-send" onclick="pushData()">ENVIAR DATO</button>
            <button class="btn btn-undo" onclick="popData()">DESHACER</button>
        </div>
        <div class="history-section">
            <div class="history-title" style="margin-bottom:10px; font-size:12px; color:gray;">FLUJO DE DATOS (ÚLTIMOS 8)</div>
            <div id="logs" class="badge-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs, deleteDoc, doc, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAKITV7P-n2hhDdtyhyHR8l6TLu7SMqkq4",
            authDomain: "aviator-engine.firebaseapp.com",
            projectId: "aviator-engine",
            storageBucket: "aviator-engine.firebasestorage.app",
            messagingSenderId: "46567723254",
            appId: "1:46567723254:web:c3108b6fe059bdd93a9cd7"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        const mySess = "VIP_" + Math.floor(Math.random() * 8888);
        document.getElementById('sessID').innerText = mySess;

        window.pushData = async () => {
            const el = document.getElementById('val');
            const v = parseFloat(el.value);
            if (!v) return;
            await addDoc(collection(db, "history"), { value: v, session: mySess, timestamp: serverTimestamp() });
            el.value = ""; el.focus();
        };

        window.popData = async () => {
            const q = query(collection(db, "history"), where("session", "==", mySess), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) await deleteDoc(doc(db, "history", snap.docs[0].id));
        };

        const qLive = query(collection(db, "history"), where("session", "==", mySess), orderBy("timestamp", "desc"), limit(8));
        onSnapshot(qLive, (snap) => {
            const list = document.getElementById('logs');
            list.innerHTML = "";
            let reds = 0; let total = 0; let streak = true;
            snap.forEach(d => {
                const v = d.data().value;
                const div = document.createElement('div');
                div.className = `badge ${v < 2 ? 'lose' : 'win'}`;
                div.innerText = v.toFixed(2);
                list.appendChild(div);
                if (streak && v < 1.5) reds++; else streak = false;
                total++;
            });
            document.getElementById('countReds').innerText = reds;
            document.getElementById('totalSess').innerText = total;
        });
        document.getElementById('val').addEventListener('keypress', e => e.key === 'Enter' && pushData());
    </script>
</body>
</html>
