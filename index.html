<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V10.5 - SAFE GUARD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --safe: #00ff88; --danger: #ff4444; --bg: #0d0f14; --panel: #1a1d26; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .card-main { background: var(--panel); border: 1px solid #2d323e; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .display-signal { font-size: 5.5rem; font-weight: 800; text-align: center; line-height: 1; transition: 0.3s; }
        .status-pill { padding: 6px 16px; border-radius: 50px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        .bg-safe-pill { background: rgba(0, 255, 136, 0.1); color: var(--safe); border: 1px solid var(--safe); }
        .bg-danger-pill { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .input-control { background: #000 !important; color: #fff !important; border: 1px solid #333 !important; font-size: 1.5rem; }
        .btn-register { background: #fff; color: #000; font-weight: bold; border-radius: 12px; font-size: 1.2rem; }
        .btn-register:active { transform: scale(0.98); }
        .log-list { height: 80px; overflow-y: auto; font-size: 0.7rem; font-family: monospace; color: #888; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card-main p-4 mx-auto" style="max-width: 650px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="m-0 fw-bold">SAFE-GUARD <span class="text-info">V10.5</span></h5>
                <small class="text-muted">ID: 8345781964</small>
            </div>
            <div id="status-pill" class="status-pill bg-safe-pill">ESCANEANDO</div>
        </div>

        <div class="text-center py-4 mb-4 border border-secondary rounded-4 bg-black bg-opacity-25">
            <small class="text-muted text-uppercase d-block mb-1">Retiro Sugerido</small>
            <div id="out-target" class="display-signal" style="color: var(--safe);">---</div>
            <div class="mt-4 px-4">
                <div class="d-flex justify-content-between small mb-1">
                    <span class="text-muted">FIABILIDAD MATEMÁTICA</span>
                    <b id="conf-val" class="text-info">0%</b>
                </div>
                <div class="progress" style="height: 6px; background: #222;">
                    <div id="conf-bar" class="progress-bar bg-info" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <canvas id="trendChart" style="max-height: 150px;"></canvas>
        </div>

        <div class="row g-3 mb-4 text-center">
            <div class="col-6">
                <div class="p-2 border border-secondary rounded-3">
                    <small class="text-muted d-block">PROBABILIDAD ÉXITO</small>
                    <h5 id="prob-val" class="m-0">0%</h5>
                </div>
            </div>
            <div class="col-6">
                <div class="p-2 border border-secondary rounded-3">
                    <small class="text-muted d-block">MUESTRA (DATABASE)</small>
                    <h5 id="sample-val" class="m-0">0/15</h5>
                </div>
            </div>
        </div>

        <div class="p-3 bg-dark rounded-4">
            <div class="row g-2">
                <div class="col-8">
                    <input type="number" id="val-in" class="form-control input-control text-center" placeholder="0.00" step="0.01" autofocus>
                </div>
                <div class="col-4">
                    <button id="btn-add" class="btn btn-register w-100 h-100">REGISTRAR</button>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-2 px-1">
                <div id="log-history" class="log-list flex-grow-1">Esperando datos...</div>
                <button id="btn-reset" class="btn btn-link btn-sm text-danger text-decoration-none">RESETEAR</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    // 1. CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAKITV7P-n2hhDdtyhyHR8l6TLu7SMqkq4",
        authDomain: "aviator-engine.firebaseapp.com",
        projectId: "aviator-engine",
        storageBucket: "aviator-engine.firebasestorage.app",
        messagingSenderId: "46567723254",
        appId: "1:46567723254:web:c3108b6fe059bdd93a9cd7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let history = [];

    // 2. CONFIGURACIÓN GRÁFICA
    const ctx = document.getElementById('trendChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: '#00d4ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,212,255,0.05)', pointRadius: 0 }]},
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#222' }, ticks: { display: false } } } }
    });

    // 3. ESCUCHA EN TIEMPO REAL
    onSnapshot(query(collection(db, "history"), orderBy("timestamp", "desc"), limit(15)), (snap) => {
        history = snap.docs.map(d => d.data().value).reverse();
        updateUI();
    });

    function updateUI() {
        document.getElementById('sample-val').innerText = history.length + "/15";
        document.getElementById('log-history').innerHTML = history.slice(-5).map(v => `> Registrado: ${v}x`).join('<br>');
        
        chart.data.labels = history.map((_, i) => i);
        chart.data.datasets[0].data = history;
        chart.update();

        if (history.length >= 5) runSafeAlgorithm();
    }

    function runSafeAlgorithm() {
        const last = history[history.length - 1];
        let blueCount = history.slice(-6).filter(v => v < 1.8).length;

        let target = 1.30;
        let conf = 75;
        let isDanger = false;

        // LÓGICA DE DETECCIÓN
        if (blueCount >= 4) {
            target = 1.15; // Ajuste automático por saturación
            conf = 96;
            isDanger = true;
        } else if (last < 1.3) {
            target = 1.25;
            conf = 88;
        }

        // ACTUALIZACIÓN DE INTERFAZ
        const out = document.getElementById('out-target');
        const pill = document.getElementById('status-pill');
        
        out.innerText = target.toFixed(2) + "x";
        document.getElementById('conf-val').innerText = conf + "%";
        document.getElementById('conf-bar').style.width = conf + "%";
        document.getElementById('prob-val').innerText = (conf - 4) + "%";

        if (isDanger) {
            pill.innerText = "PELIGRO: SATURACIÓN";
            pill.className = "status-pill bg-danger-pill";
            out.style.color = "var(--danger)";
        } else {
            pill.innerText = "ESTADO: SEGURO";
            pill.className = "status-pill bg-safe-pill";
            out.style.color = "var(--safe)";
        }
    }

    // 4. ACCIONES
    async function registrar() {
        const input = document.getElementById('val-in');
        const v = parseFloat(input.value);
        if (v > 0) {
            await addDoc(collection(db, "history"), { value: v, timestamp: serverTimestamp() });
            input.value = "";
            input.focus();
        }
    }

    document.getElementById('btn-add').onclick = registrar;
    document.getElementById('val-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') registrar(); });
    document.getElementById('btn-reset').onclick = async () => {
        if(confirm("¿Borrar base de datos?")) {
            const s = await getDocs(collection(db, "history"));
            s.forEach(async d => await deleteDoc(d.ref));
        }
    };
</script>
</body>
</html>
