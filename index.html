<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAFE-GUARD PRECISION V11.6</title>
    <style>
        :root { --bg: #0b0e11; --primary: #fcd535; --danger: #f6465d; --card: #1e2329; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2b3139; text-align: center; }
        .main-input { width: 100%; background: #2b3139; border: 2px solid transparent; border-radius: 12px; color: white; padding: 20px; font-size: 35px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .main-input:focus { border-color: var(--primary); outline: none; }
        .btn-send { width: 100%; background: var(--primary); color: black; padding: 18px; border: none; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; margin-bottom: 10px; }
        .btn-undo { width: 100%; background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .flow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 25px; justify-content: center; }
        .badge { background: #2b3139; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .lose { color: var(--danger); border-bottom: 2px solid var(--danger); }
        .win { color: var(--primary); border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body>
    <div class="panel">
        <h2 style="color:var(--primary); margin-bottom: 20px;">SAFE-GUARD PRECISION</h2>
        
        <input type="number" id="val" class="main-input" placeholder="0.00" step="0.01" autofocus>
        
        <button class="btn-send" onclick="pushData()">ENVIAR RESULTADO</button>
        <button class="btn-undo" onclick="popData()">DESHACER ÚLTIMO</button>

        <div id="logs" class="flow"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAKITV7P-n2hhDdtyhyHR8l6TLu7SMqkq4",
            authDomain: "aviator-engine.firebaseapp.com",
            projectId: "aviator-engine",
            storageBucket: "aviator-engine.firebasestorage.app",
            messagingSenderId: "46567723254",
            appId: "1:46567723254:web:c3108b6fe059bdd93a9cd7"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);

        window.pushData = async () => {
            const el = document.getElementById('val');
            const v = parseFloat(el.value);
            if (!v) return;
            await addDoc(collection(db, "history"), { value: v, timestamp: serverTimestamp() });
            el.value = ""; el.focus();
        };

        window.popData = async () => {
            const q = query(collection(db, "history"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) await deleteDoc(doc(db, "history", snap.docs[0].id));
        };

        const qLive = query(collection(db, "history"), orderBy("timestamp", "desc"), limit(12));
        onSnapshot(qLive, (snap) => {
            const list = document.getElementById('logs');
            list.innerHTML = "";
            snap.forEach(d => {
                const v = d.data().value;
                const div = document.createElement('div');
                div.className = `badge ${v < 2 ? 'lose' : 'win'}`;
                div.innerText = v.toFixed(2) + "x";
                list.appendChild(div);
            });
        });
        document.getElementById('val').addEventListener('keypress', e => e.key === 'Enter' && pushData());
    </script>
</body>
</html>
