<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE-GUARD PRO | Panel de Control</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #161a1e;
            --primary: #f0b90b; /* Color estilo Binance/Trading */
            --danger: #f6465d;
            --success: #0ecb81;
            --text: #eaecef;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin-top: 30px;
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2b3139;
        }

        h1 { font-size: 22px; color: var(--primary); margin-bottom: 5px; }
        .status { font-size: 12px; margin-bottom: 20px; color: #848e9c; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            flex: 1;
            background: #2b3139;
            border: 1px solid #474d57;
            border-radius: 8px;
            color: white;
            padding: 15px;
            font-size: 18px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-add { background: var(--primary); color: #000; }
        .btn-add:hover { background: #d9a508; }

        .btn-del { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-del:hover { background: rgba(246, 70, 93, 0.1); }

        /* Estilo para el historial */
        .history-box {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #2b3139;
            padding-top: 15px;
        }

        .history-title { font-size: 14px; color: #848e9c; margin-bottom: 10px; }
        
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 13px;
            background: #2b3139;
            border-bottom: 2px solid #474d57;
        }

        .badge.red { color: var(--danger); border-color: var(--danger); }
        .badge.gold { color: var(--primary); border-color: var(--primary); }

        #sessionID { font-weight: bold; color: var(--text); }
    </style>
</head>
<body>

    <div class="container">
        <h1>SAFE-GUARD V10.8</h1>
        <div class="status">Sesión Activa: <span id="sessionID">Cargando...</span></div>

        <div class="input-group">
            <input type="number" id="multiplier" step="0.01" placeholder="Ej: 1.25" autofocus>
        </div>

        <button class="btn btn-add" onclick="sendData()">REGISTRAR ENTRADA</button>
        <button class="btn btn-del" onclick="deleteLast()">BORRAR ÚLTIMO ERROR</button>

        <div class="history-box">
            <div class="history-title">Tus últimos registros (Sesión):</div>
            <div id="badgeHistory" class="badge-container">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs, deleteDoc, doc, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKITV7P-n2hhDdtyhyHR8l6TLu7SMqkq4",
            authDomain: "aviator-engine.firebaseapp.com",
            projectId: "aviator-engine",
            storageBucket: "aviator-engine.firebasestorage.app",
            messagingSenderId: "46567723254",
            appId: "1:46567723254:web:c3108b6fe059bdd93a9cd7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Generar ID de sesión único para el usuario actual
        const myID = "OP_" + Math.floor(Math.random() * 9999);
        document.getElementById('sessionID').innerText = myID;

        // Función para enviar datos
        window.sendData = async () => {
            const input = document.getElementById('multiplier');
            const val = parseFloat(input.value);
            
            if (!val || val <= 0) return;

            try {
                await addDoc(collection(db, "history"), {
                    value: val,
                    session: myID,
                    timestamp: serverTimestamp()
                });
                input.value = "";
                input.focus();
            } catch (e) { console.error("Error al enviar:", e); }
        };

        // Función para borrar solo el último de esta sesión
        window.deleteLast = async () => {
            const q = query(collection(db, "history"), where("session", "==", myID), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) {
                await deleteDoc(doc(db, "history", snap.docs[0].id));
            }
        };

        // Escuchar cambios para mostrar el historial visual de esta sesión
        const qHistory = query(collection(db, "history"), where("session", "==", myID), orderBy("timestamp", "desc"), limit(8));
        onSnapshot(qHistory, (snap) => {
            const container = document.getElementById('badgeHistory');
            container.innerHTML = "";
            snap.forEach(doc => {
                const val = doc.data().value;
                const b = document.createElement('div');
                b.className = `badge ${val < 2 ? 'red' : 'gold'}`;
                b.innerText = val.toFixed(2) + "x";
                container.appendChild(b);
            });
        });

        // Detectar tecla Enter
        document.getElementById('multiplier').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendData();
        });
    </script>
</body>
</html>
