<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE-GUARD V15.1 | CALIBRACIÓN EN VIVO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --primary: #fcd535; --danger: #f6465d; --success: #0ecb81; --card: #1e2329; --text: #eaeaea; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .panel { width: 90%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #2b3139; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        h2 { color: var(--primary); font-weight: 900; margin: 0 0 5px 0; letter-spacing: -1px; }
        .user-badge { font-size: 10px; color: #848e9c; margin-bottom: 5px; display: block; background: #2b3139; padding: 4px 10px; border-radius: 20px; width: fit-content; margin: 0 auto 5px auto; }
        
        /* Estilo del Contador de Calibración */
        #status-box { font-size: 12px; font-weight: bold; margin-bottom: 20px; padding: 8px; border-radius: 12px; transition: 0.3s; }
        .calibrating { background: rgba(252, 213, 53, 0.1); color: var(--primary); border: 1px solid rgba(252, 213, 53, 0.3); }
        .ready { background: rgba(14, 203, 129, 0.1); color: var(--success); border: 1px solid rgba(14, 203, 129, 0.3); }

        .main-input { width: 100%; background: #2b3139; border: 2px solid transparent; border-radius: 16px; color: white; padding: 20px; font-size: 42px; font-weight: 900; text-align: center; margin-bottom: 15px; box-sizing: border-box; transition: 0.3s; }
        .main-input:focus { border-color: var(--primary); outline: none; background: #323a45; }

        .btn-send { width: 100%; background: var(--primary); color: black; padding: 20px; border: none; border-radius: 16px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-send:active { transform: scale(0.98); }
        
        .btn-undo { width: 100%; background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 14px; }

        .history-flow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; justify-content: center; min-height: 80px; }
        .badge { background: #2b3139; padding: 10px 14px; border-radius: 8px; font-weight: 700; font-size: 14px; border-bottom: 3px solid #474d57; animation: fadeIn 0.3s ease; }
        .lose { color: var(--danger); border-color: var(--danger); }
        .win { color: var(--primary); border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="panel">
        <h2>SAFE-GUARD V15.1</h2>
        <span id="userIdDisplay" class="user-badge">Cargando sesión...</span>
        
        <div id="status-box" class="calibrating">
            Esperando datos para calibrar...
        </div>
        
        <input type="number" id="val" class="main-input" placeholder="0.00" step="0.01" autofocus>
        
        <button class="btn-send" onclick="pushData()">ENVIAR RESULTADO</button>
        <button class="btn-undo" onclick="popData()">DESHACER ÚLTIMO</button>

        <div id="logs" class="history-flow"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs, deleteDoc, doc, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAKITV7P-n2hhDdtyhyHR8l6TLu7SMqkq4",
            authDomain: "aviator-engine.firebaseapp.com",
            projectId: "aviator-engine",
            storageBucket: "aviator-engine.firebasestorage.app",
            messagingSenderId: "46567723254",
            appId: "1:46567723254:web:c3108b6fe059bdd93a9cd7"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);

        let myId = localStorage.getItem('aviator_user_id');
        if (!myId) {
            myId = 'U' + Math.random().toString(36).substr(2, 7).toUpperCase();
            localStorage.setItem('aviator_user_id', myId);
        }
        document.getElementById('userIdDisplay').innerText = "SESIÓN: " + myId;

        window.pushData = async () => {
            const el = document.getElementById('val');
            const v = parseFloat(el.value);
            if (!v || isNaN(v)) return;
            
            try {
                await addDoc(collection(db, "history"), { 
                    value: v, 
                    timestamp: serverTimestamp(),
                    userId: myId 
                });
                el.value = ""; el.focus();
            } catch (e) { console.error("Error:", e); }
        };

        window.popData = async () => {
            const q = query(collection(db, "history"), where("userId", "==", myId), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) await deleteDoc(doc(db, "history", snap.docs[0].id));
        };

        const qLive = query(collection(db, "history"), where("userId", "==", myId), orderBy("timestamp", "desc"), limit(12));

        onSnapshot(qLive, (snap) => {
            const list = document.getElementById('logs');
            const statusBox = document.getElementById('status-box');
            list.innerHTML = "";
            
            let count = 0;
            snap.forEach(d => {
                count++;
                const v = d.data().value;
                const div = document.createElement('div');
                div.className = `badge ${v < 2.0 ? 'lose' : 'win'}`;
                div.innerText = v.toFixed(2) + "x";
                list.appendChild(div);
            });

            // Lógica del contador visual
            if (count < 8) {
                statusBox.innerText = `CALIBRANDO: Faltan ${8 - count} registros`;
                statusBox.className = "calibrating";
            } else {
                statusBox.innerText = "✅ MOTOR CALIBRADO - LISTO";
                statusBox.className = "ready";
            }
        });

        document.getElementById('val').addEventListener('keypress', e => { if (e.key === 'Enter') pushData(); });
    </script>
</body>
</html>
