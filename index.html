<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE-GUARD 10.6 | CONTROL PANEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --safe: #00ff88; --danger: #ff4444; --bg: #0b0e11; --panel: #15191e; --accent: #00d4ff; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .card-main { 
            background: var(--panel); 
            border: 1px solid #2b2f36; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-top: 5vh;
        }

        .monitor {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .alert-active { 
            border-color: var(--safe); 
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.05);
        }

        .display-val { font-size: 4.5rem; font-weight: 800; color: #fff; }
        
        .input-control {
            background: #000 !important;
            border: 2px solid #333 !important;
            color: white !important;
            font-size: 1.8rem;
            text-align: center;
            border-radius: 10px;
        }

        .btn-register {
            background: #fff;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 10px;
            padding: 12px;
            border: none;
        }

        .btn-register:active { transform: scale(0.98); background: var(--safe); }

        .tag {
            padding: 5px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
        }

        .dot { height: 8px; width: 8px; background: var(--safe); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px var(--safe); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card-main p-4 w-100" style="max-width: 450px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">SAFE-GUARD <span style="color:var(--accent)">10.6</span></h5>
            <div class="small"><span class="dot"></span> ENGINE READY</div>
        </div>

        <div id="monitor" class="monitor text-center mb-4">
            <small class="text-muted fw-bold">PROBABILIDAD DE SALIDA</small>
            <div id="target-text" class="display-val my-1">---</div>
            
            <div class="px-2">
                <div class="progress" style="height: 6px; background: #222;">
                    <div id="conf-bar" class="progress-bar bg-info" style="width: 0%"></div>
                </div>
                <div class="d-flex justify-content-between mt-1 small">
                    <span class="text-muted">CONFIANZA</span>
                    <span id="conf-text" class="fw-bold text-info">0%</span>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <input type="number" id="val-in" class="form-control input-control mb-3" placeholder="0.00" step="0.01">
            <button id="btn-send" class="btn btn-register w-100">REGISTRAR EN TIEMPO REAL</button>
        </div>

        <div class="mt-4">
            <p class="small text-muted fw-bold mb-2 text-uppercase color">Historial de Ronda:</p>
            <div id="history-box" class="d-flex flex-wrap gap-2">
                </div>
        </div>

        <button id="btn-reset" class="btn btn-link btn-sm text-danger text-decoration-none mt-4 w-100 opacity-50 small">Resetear Datos de Sesión</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    // --- CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAKITV7P-n2hhDdtyhyHR8l6TLu7SMqkq4",
        authDomain: "aviator-engine.firebaseapp.com",
        projectId: "aviator-engine",
        storageBucket: "aviator-engine.firebasestorage.app",
        messagingSenderId: "46567723254",
        appId: "1:46567723254:web:c3108b6fe059bdd93a9cd7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Escuchar cambios
    onSnapshot(query(collection(db, "history"), orderBy("timestamp", "desc"), limit(6)), (snap) => {
        const history = snap.docs.map(d => d.data().value).reverse();
        updateDisplay(history);
    });

    function updateDisplay(history) {
        const box = document.getElementById('history-box');
        box.innerHTML = history.map(v => `<span class="tag" style="background:${v < 2 ? '#3d1010' : '#103d25'}; color:${v < 2 ? '#ff4444' : '#00ff88'}">${v}x</span>`).join('');

        if(history.length < 3) return;

        let blueCount = history.filter(v => v < 1.8).length;
        let target = 1.30;
        let conf = 40;

        if (blueCount >= 3) {
            target = 1.22;
            conf = 94;
            document.getElementById('monitor').classList.add('alert-active');
            // Vibrar celular si es posible
            if(window.navigator.vibrate) window.navigator.vibrate(200);
        } else {
            document.getElementById('monitor').classList.remove('alert-active');
        }

        document.getElementById('target-text').innerText = target.toFixed(2) + "x";
        document.getElementById('conf-text').innerText = conf + "%";
        document.getElementById('conf-bar').style.width = conf + "%";
    }

    async function save() {
        const input = document.getElementById('val-in');
        const val = parseFloat(input.value);
        if (val > 0) {
            await addDoc(collection(db, "history"), { value: val, timestamp: serverTimestamp() });
            input.value = "";
            input.focus();
        }
    }

    document.getElementById('btn-send').onclick = save;
    document.getElementById('val-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') save(); });
    document.getElementById('btn-reset').onclick = async () => {
        if(confirm("¿Limpiar historial de Firebase?")) {
            const s = await getDocs(collection(db, "history"));
            s.forEach(async d => await deleteDoc(d.ref));
        }
    };
</script>
</body>
</html>
